# version: '3'

services:

  mongo:
    image: mongo:5
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  user-service:
    build: .
    container_name: user-service
    ports:
      - "8000:8000"
    depends_on:
      - mongo

volumes:
  mongo-data: